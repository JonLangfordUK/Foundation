name: Foundation Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: foundation-build-${{ github.ref }}
  cancel-in-progress: false

env:
  FOUNDATION_GAME: template-game
  FOUNDATION_GAME_PROJECT: external\template-game\game
  CARGO_TARGET_DIR: C:\actions-runner\cargo-target\Foundation

jobs:
  main-source-branch-policy:
    name: Main source branch policy
    runs-on: [self-hosted, Windows]
    steps:
      - name: Require dev or hotfix source for main
        shell: cmd
        run: |
          if not "%GITHUB_EVENT_NAME%"=="pull_request" exit /b 0
          if not "%GITHUB_BASE_REF%"=="main" exit /b 0
          if "%GITHUB_HEAD_REF%"=="dev" exit /b 0
          if "%GITHUB_HEAD_REF:~0,7%"=="hotfix/" exit /b 0
          echo Pull requests into main must come from dev or hotfix/*.
          echo Actual source branch: %GITHUB_HEAD_REF%
          exit /b 1

  validate:
    name: Validate workspace on Windows
    needs: main-source-branch-policy
    runs-on: [self-hosted, Windows]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Rust tools
        shell: cmd
        run: |
          where cargo
          where rustup

      - name: Validate Rust workspace
        shell: cmd
        run: scripts\validate-project.cmd

  package:
    name: Package windows-x64 ${{ matrix.configuration }} on Windows
    needs: validate
    runs-on: [self-hosted, Windows]
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - test
          - shipping
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Rust tools
        shell: cmd
        run: |
          where cargo
          where rustup

      - name: Install selected Rust target
        shell: cmd
        run: rustup target add x86_64-pc-windows-msvc

      - name: Check out TemplateGame reference project
        uses: actions/checkout@v4
        with:
          repository: Perfect-Pixel-Games/template-game
          ref: dev
          path: external/template-game

      - name: Use current Foundation checkout as TemplateGame engine
        shell: cmd
        run: |
          if exist external\template-game\engine rmdir /S /Q external\template-game\engine
          mklink /J external\template-game\engine "%GITHUB_WORKSPACE%"

      - name: Package Foundation game
        shell: cmd
        run: >-
          cargo run -p foundation-build -- package
          --project "%FOUNDATION_GAME_PROJECT%"
          --platform windows-x64
          --configuration "${{ matrix.configuration }}"
          --target game

      - name: Stage release assets
        shell: cmd
        run: |
          if not exist artifacts\release-assets mkdir artifacts\release-assets
          copy "artifacts\packages\%FOUNDATION_GAME%\windows-x64\${{ matrix.configuration }}\*.tar.gz" artifacts\release-assets\

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FOUNDATION_GAME }}-windows-x64-${{ matrix.configuration }}
          path: artifacts/release-assets/*.tar.gz
          if-no-files-found: error


  dev-tag:
    name: Create tagged dev checkpoint
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: package
    runs-on: [self-hosted, Windows]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next dev version tag
        id: next-version
        uses: actions/github-script@v7
        with:
          script: |
            const tags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const devPatches = tags
              .map((tag) => tag.name.match(/^0\.0\.(\d+)$/))
              .filter(Boolean)
              .map((match) => Number(match[1]))
              .sort((left, right) => left - right);
            const latestPatch = devPatches.at(-1);
            const nextPatch = latestPatch === undefined ? 0 : latestPatch + 1;
            core.setOutput('tag', `0.0.${nextPatch}`);

      - name: Create version tag
        shell: cmd
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next-version.outputs.tag }}" "%GITHUB_SHA%"
          git push origin "${{ steps.next-version.outputs.tag }}"

  main-tag:
    name: Create tagged main checkpoint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: package
    runs-on: [self-hosted, Windows]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next main version tag
        id: next-version
        uses: actions/github-script@v7
        with:
          script: |
            const tags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const mainMinors = tags
              .map((tag) => tag.name.match(/^0\.(\d+)\.0$/))
              .filter(Boolean)
              .map((match) => Number(match[1]))
              .filter((minor) => minor > 0)
              .sort((left, right) => left - right);
            const latestMinor = mainMinors.at(-1);
            const nextMinor = latestMinor === undefined ? 1 : latestMinor + 1;
            core.setOutput('tag', `0.${nextMinor}.0`);

      - name: Create version tag
        shell: cmd
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next-version.outputs.tag }}" "%GITHUB_SHA%"
          git push origin "${{ steps.next-version.outputs.tag }}"
