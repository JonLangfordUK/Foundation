name: Foundation Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: foundation-build-${{ github.ref }}
  cancel-in-progress: false

env:
  FOUNDATION_GAME: template-game
  FOUNDATION_GAME_PROJECT: external\template-game\game
  CARGO_TARGET_DIR: C:\actions-runner\cargo-target\Foundation

jobs:
  main-source-branch-policy:
    name: Main source branch policy
    runs-on: [self-hosted, Windows]
    steps:
      - name: Require dev or hotfix source for main
        shell: cmd
        run: |
          if not "%GITHUB_EVENT_NAME%"=="pull_request" exit /b 0
          if not "%GITHUB_BASE_REF%"=="main" exit /b 0
          if "%GITHUB_HEAD_REF%"=="dev" exit /b 0
          if "%GITHUB_HEAD_REF:~0,7%"=="hotfix/" exit /b 0
          echo Pull requests into main must come from dev or hotfix/*.
          echo Actual source branch: %GITHUB_HEAD_REF%
          exit /b 1

  validate:
    name: Validate workspace on Windows
    needs: main-source-branch-policy
    runs-on: [self-hosted, Windows]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Rust tools
        shell: cmd
        run: |
          where cargo
          where rustup

      - name: Validate Rust workspace
        shell: cmd
        run: scripts\validate-project.cmd

  package:
    name: Package windows-x64 ${{ matrix.configuration }} on Windows
    needs: validate
    runs-on: [self-hosted, Windows]
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - test
          - shipping
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Rust tools
        shell: cmd
        run: |
          where cargo
          where rustup

      - name: Install selected Rust target
        shell: cmd
        run: rustup target add x86_64-pc-windows-msvc

      - name: Check out TemplateGame reference project
        uses: actions/checkout@v4
        with:
          repository: Perfect-Pixel-Games/template-game
          ref: dev
          path: external/template-game

      - name: Use current Foundation checkout as TemplateGame engine
        shell: cmd
        run: |
          if exist external\template-game\engine rmdir /S /Q external\template-game\engine
          mklink /J external\template-game\engine "%GITHUB_WORKSPACE%"

      - name: Package Foundation game
        shell: cmd
        run: >-
          cargo run -p foundation-build -- package
          --project "%FOUNDATION_GAME_PROJECT%"
          --platform windows-x64
          --configuration "${{ matrix.configuration }}"
          --target game

      - name: Stage release assets
        shell: cmd
        run: |
          if not exist artifacts\release-assets mkdir artifacts\release-assets
          copy "artifacts\packages\%FOUNDATION_GAME%\windows-x64\${{ matrix.configuration }}\*.tar.gz" artifacts\release-assets\

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FOUNDATION_GAME }}-windows-x64-${{ matrix.configuration }}
          path: artifacts/release-assets/*.tar.gz
          if-no-files-found: error
