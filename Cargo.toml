[workspace]
members = [
    "crates/foundation-runtime-library",
    "crates/jackdaw-editor",
    "games/template-game",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[workspace.dependencies]
bevy = { version = "0.18.1", features = [
    "file_watcher",
    "reflect_documentation",
    "serialize",
    "experimental_bevy_feathers",
] }
ctrlc = "3"
jackdaw = { version = "0.4.1", default-features = false }
jackdaw_runtime = "0.4.1"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
