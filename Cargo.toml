[workspace]
members = [
    "crates/engine",
    "crates/game",
    "crates/editor",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[workspace.dependencies]
bevy = "0.18.1"
pigame-engine = { path = "crates/engine" }
pigame-game = { path = "crates/game" }
